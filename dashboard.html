<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Welcome Tabisa 👋</h1>
<p>Automation Dashboard</p>

<div class="container">

  <div class="card">
    <h3>HR Reports</h3>
    <p>12 Reports Generated</p>
  </div>

  <div class="card">
    <h3>Automations Run</h3>
    <p>8 Today</p>
  </div>

  <div class="card">
    <h3>System Status</h3>
    <p>Active ✅</p>
  </div>

</div>

<button onclick="runAutomation()">Run Automation</button>

<br>

<button onclick="logout()">Logout</button>

<script>
function logout() {
  window.location.href = "index.html";
}

function runAutomation() {
  alert("Automation running successfully!");
}
</script>

</body>
</html>
