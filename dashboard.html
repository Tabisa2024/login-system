<!DOCTYPE html>
<html>
<head>
  <title>AI Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .chat-container {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      background: #1e293b;
      border-radius: 10px;
      padding: 15px;
    }

    .messages {
      height: 300px;
      overflow-y: auto;
      text-align: left;
      margin-bottom: 10px;
    }

    .user, .bot {
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .user {
      background: #38bdf8;
      text-align: right;
    }

    .bot {
      background: #334155;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
    }

    .top-buttons {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Tabisa AI Assistant 🤖</h1>
<p>Ask anything about HR, reports, or automation</p>

<div class="chat-container">
  <div class="messages" id="chat"></div>

  <input type="text" id="userInput" placeholder="Ask something...">
  <button onclick="sendMessage()">Send</button>
</div>

<div class="top-buttons">
  <button onclick="logout()">Logout</button>
</div>

<script>

if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}

function sendMessage() {
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chat");

  let userText = input.value;

  if(userText === "") return;

 
  chat.innerHTML += `<div class="user">${userText}</div>`;

  
  let response = "";

  if(userText.toLowerCase().includes("report")) {
    response = "✅ Latest HR report generated successfully.";
  } 
  else if(userText.toLowerCase().includes("automation")) {
    response = "⚙️ Automation process is running smoothly.";
  }
  else if(userText.toLowerCase().includes("status")) {
    response = "✅ All systems are operational.";
  } 
  else {
    response = "🤖 I'm your AI assistant. Try asking about reports or automation.";
  }

  setTimeout(() => {
    chat.innerHTML += `<div class="bot">${response}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = "";
}

</script>

</body>
</html>
