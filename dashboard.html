<!DOCTYPE html>
<html>
<head>
  <title>Tabisa's AI Assistant</title>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .chat-container {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      background: #1e293b;
      border-radius: 10px;
      padding: 15px;
    }

    .messages {
      height: 300px;
      overflow-y: auto;
      text-align: left;
      margin-bottom: 10px;
    }

    .user {
      background: #38bdf8;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      text-align: right;
    }

    .bot {
      background: #334155;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      text-align: left;
    }

    input {
      width: 65%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    canvas {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>Tabisa's AI Assistant 🤖</h1>
<p>Ask about reports, automation, or system status</p>

<div class="chat-container">
  <div class="messages" id="chat"></div>

  <input type="text" id="userInput" placeholder="Ask something...">
  <button onclick="sendMessage()">Send</button>

  <br><br>
  <button onclick="quickAsk('Generate HR report')">Generate Report</button>
  <button onclick="quickAsk('Check system status')">System Status</button>
  <button onclick="quickAsk('Run automation')">Run Automation</button>
  <button onclick="clearChat()">Clear Chat</button>
</div>

<button onclick="logout()">Logout</button>

<h2>📊 Automation Dashboard</h2>
<canvas id="myChart" width="400" height="200"></canvas>

<script>

// ✅ Check login
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "index.html";
}

// ✅ Load chat + chart
window.onload = function () {

  let savedChat = localStorage.getItem("chatHistory");
  if (savedChat) {
    document.getElementById("chat").innerHTML = savedChat;
  }

  // ✅ Create chart
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Reports', 'Automations', 'Errors'],
      datasets: [{
        label: 'System Activity',
        data: [12, 8, 2],
        backgroundColor: ['#38bdf8', '#22c55e', '#ef4444']
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: 'white' }
        }
      },
      scales: {
        y: { ticks: { color: 'white' } },
        x: { ticks: { color: 'white' } }
      }
    }
  });
};

// ✅ Chat
function sendMessage() {
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chat");

  let userText = input.value;
  if(userText === "") return;

  chat.innerHTML += `<div class="user">${userText}</div>`;

  let response = "";
