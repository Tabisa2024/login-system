<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .chat-container {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      background: #1e293b;
      border-radius: 10px;
      padding: 15px;
    }

    .messages {
      height: 300px;
      overflow-y: auto;
      text-align: left;
      margin-bottom: 10px;
    }

    .user {
      background: #38bdf8;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      text-align: right;
    }

    .bot {
      background: #334155;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Tabisa AI Assistant 🤖</h1>
<p>Ask about reports, automation, or system status</p>

<div class="chat-container">
  <div class="messages" id="chat"></div>

  <input type="text" id="userInput" placeholder="Ask something...">
  <button onclick="sendMessage()">Send</button>
</div>

<button onclick="logout()">Logout</button>

<script>

// Check login
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "index.html";
}

// Logout
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}

// Chat logic
function sendMessage() {
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chat");

  let userText = input.value;

  if(userText === "") return;

  chat.innerHTML += `<div class="user">${userText}</div>`;

  let response = "";

  if(userText.toLowerCase().includes("report")) {
    response = "✅ HR reports generated successfully.";
  } 
  else if(userText.toLowerCase().includes("automation")) {
    response = "⚙️ Automation is running smoothly.";
  }
  else if(userText.toLowerCase().includes("status")) {
    response = "✅ System is active and healthy.";
  } 
  else {
    response = "🤖 I'm your AI assistant. Try asking about reports or automation.";
  }

  setTimeout(() => {
    chat.innerHTML += `<div class="bot">${response}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = "";
}

</script>

</body>
</html>
``
