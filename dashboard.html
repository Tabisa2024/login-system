<!DOCTYPE html>
<html>
<head>
  <title>Tabisa's AI Assistant</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .chat-container {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      background: #1e293b;
      border-radius: 10px;
      padding: 15px;
    }

    .messages {
      height: 300px;
      overflow-y: auto;
      text-align: left;
      margin-bottom: 10px;
    }

    .user {
      background: #38bdf8;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      text-align: right;
    }

    .bot {
      background: #334155;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      text-align: left;
    }

    input {
      width: 65%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    .quick-buttons {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Tabisa's AI Assistant 🤖</h1>
<p>Ask about reports, automation, or system status</p>

<div class="chat-container">
  <div class="messages" id="chat"></div>

  <input type="text" id="userInput" placeholder="Ask something...">
  <button onclick="sendMessage()">Send</button>

  <div class="quick-buttons">
    <button onclick="quickAsk('Generate HR report')">Generate Report</button>
    <button onclick="quickAsk('Check system status')">System Status</button>
    <button onclick="quickAsk('Run automation')">Run Automation</button>
    <button onclick="clearChat()">Clear Chat</button>
  </div>
</div>

<button onclick="logout()">Logout</button>

<script>

// ✅ Check login
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "index.html";
}

//  Load saved chat
window.onload = function() {
  let savedChat = localStorage.getItem("chatHistory");
  if (savedChat) {
    document.getElementById("chat").innerHTML = savedChat;
  }
};

// Send message
function sendMessage() {
  let input = document.getElementById("userInput");
  let chat = document.getElementById("chat");

  let userText = input.value;
  if(userText === "") return;

  let userMsg = `<div class="user">${userText}</div>`;
  chat.innerHTML += userMsg;

  let response = "";

  if(userText.toLowerCase().includes("report")) {
    response = "✅ Your HR report has been generated and is ready for review.";
  } 
  else if(userText.toLowerCase().includes("automation")) {
    response = "⚙️ Automation completed successfully. All workflows executed.";
  }
  else if(userText.toLowerCase().includes("status")) {
    response = "✅ System is fully operational with no issues detected.";
  } 
  else {
    response = "🤖 I can assist with HR automation, reporting, and system monitoring.";
  }

  setTimeout(() => {
    let botMsg = `<div class="bot">${response}</div>`;
    chat.innerHTML += botMsg;

    //  Save chat
    localStorage.setItem("chatHistory", chat.innerHTML);

    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = "";
}

// Quick buttons
function quickAsk(text) {
  document.getElementById("userInput").value = text;
  sendMessage();
}

//  Clear chat
function clearChat() {
  localStorage.removeItem("chatHistory");
  document.getElementById("chat").innerHTML = "";
}

//  Logout
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}

//  Enter key support
document.getElementById("userInput").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    sendMessage();
  }
});

</script>

</body>
</html>
